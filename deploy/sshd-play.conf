# Public guest access for the ascii-royale arena: anyone can
# `ssh play@<host>` (no password) and lands directly in the game.
# The forced command plus the restrictions below mean no shell, no
# forwarding, no file transfer.
Match User play
    ForceCommand /usr/local/bin/royale-launcher
    PermitEmptyPasswords yes
    PasswordAuthentication yes
    PubkeyAuthentication no
    AllowTcpForwarding no
    AllowAgentForwarding no
    AllowStreamLocalForwarding no
    X11Forwarding no
    PermitTunnel no
    PermitUserRC no
