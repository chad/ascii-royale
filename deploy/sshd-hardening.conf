# Global hardening for the public arena box. The play user's empty-password
# exception lives in 60-royale-play.conf; everything else is key-only.
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
LoginGraceTime 20
MaxStartups 10:50:30
MaxSessions 4
ClientAliveInterval 60
ClientAliveCountMax 5
